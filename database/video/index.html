<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>for.honey.vercel.app/database/video/</title>

<style>
body{
  min-height:100vh;
  overflow:hidden;
  background:#08040f;
  position:relative;
}

/* background utama */
.battle-bg{
  position:fixed;
  inset:0;
  overflow:hidden;
  z-index:-1;

  background:
  radial-gradient(
    circle at center,
    rgba(25,15,40,.95) 0%,
    #09040f 60%,
    #030204 100%
  );
}

/* cahaya kiri */
.battle-bg::before{
  content:"";
  position:absolute;

  top:50%;
  left:-180px;

  width:420px;
  height:420px;

  border-radius:50%;

  background:
  radial-gradient(
    circle,
    rgba(120,80,255,.55) 0%,
    rgba(110,60,255,.18) 40%,
    transparent 72%
  );

  filter:blur(70px);

  transform:
  translateY(-50%);

  animation:
  auraLeft 6s ease-in-out infinite alternate;
}

/* cahaya kanan */
.battle-bg::after{
  content:"";
  position:absolute;

  top:50%;
  right:-180px;

  width:420px;
  height:420px;

  border-radius:50%;

  background:
  radial-gradient(
    circle,
    rgba(255,70,170,.45) 0%,
    rgba(255,80,120,.14) 40%,
    transparent 72%
  );

  filter:blur(70px);

  transform:
  translateY(-50%);

  animation:
  auraRight 6s ease-in-out infinite alternate;
}

/* animasi aura */
@keyframes auraLeft{
  from{
    transform:
    translateY(-50%)
    scale(1);
  }

  to{
    transform:
    translateY(-50%)
    scale(1.12);
  }
}

@keyframes auraRight{
  from{
    transform:
    translateY(-50%)
    scale(1);
  }

  to{
    transform:
    translateY(-50%)
    scale(1.12);
  }
}
/* CARD */
.intro-card{
  position:absolute;

  top:50%;
  left:50%;

  transform:
  translate(-50%,-50%)
  scale(.08);

  width:88vw;
  height:68vh;

  border-radius:34px;

  /* TRANSPARAN */
  background:
  rgba(255,255,255,.02);

  backdrop-filter:
  blur(10px);

  -webkit-backdrop-filter:
  blur(10px);

  border:
  1px solid rgba(
  255,255,255,.08
  );

  overflow:visible;

  opacity:0;

  z-index:5;

  animation:
  cardIntro 1.8s
  cubic-bezier(
  .2,.9,.2,1
  )
  forwards;
}

/* GLOW LUAR CARD */
.intro-card::before{
  content:"";

  position:absolute;

  inset:-8px;

  border-radius:40px;

  background:
  linear-gradient(
    135deg,
    rgba(140,80,255,.95),
    rgba(255,90,180,.95),
    rgba(90,180,255,.95),
    rgba(180,120,255,.95)
  );

  z-index:-1;

  filter:
  blur(22px);

  opacity:.85;

  animation:
  glowMove 5s
  linear infinite;
}

/* glow luar aesthetic */
.intro-card::before{
  content:"";

  position:absolute;

  inset:-10px;

  border-radius:40px;

  background:
  radial-gradient(
    circle at center,
    rgba(140,80,255,.28) 0%,
    rgba(120,70,255,.14) 40%,
    transparent 75%
  );

  z-index:-1;

  filter:
  blur(24px);

  opacity:.9;
}

/* ANIMASI MANTUL MAJU */
@keyframes cardIntro{

  0%{
    opacity:0;

    transform:
    translate(-50%,-50%)
    scale(.06)
    translateY(140px);
  }

  30%{
    opacity:1;

    transform:
    translate(-50%,-50%)
    scale(1.15)
    translateY(-25px);
  }

  48%{
    transform:
    translate(-50%,-50%)
    scale(.93)
    translateY(14px);
  }

  65%{
    transform:
    translate(-50%,-50%)
    scale(1.05)
    translateY(-8px);
  }

  82%{
    transform:
    translate(-50%,-50%)
    scale(.98)
    translateY(4px);
  }

  100%{
    opacity:1;

    transform:
    translate(-50%,-50%)
    scale(1);
  }
}

/* GLOW BERGERAK */
@keyframes glowMove{

  0%{
    filter:
    blur(22px)
    hue-rotate(0deg);
  }

  100%{
    filter:
    blur(22px)
    hue-rotate(360deg);
  }
}

/* PROFILE */
.profile-box{
  position:absolute;

  top:40%;
  left:50%;

  transform:
  translate(-50%,-50%);

  display:flex;
  flex-direction:column;
  align-items:center;

  z-index:20;

  opacity:0;

  animation:
  profileShow
  1.8s ease
  .7s forwards;
}

/* FOTO */
.profile-img{
  width:60px;
  height:60px;

  border-radius:50%;

  object-fit:cover;

  border:
  2px solid rgba(
  255,255,255,.14
  );

  box-shadow:
  0 0 40px rgba(
  130,90,255,.18
  );

  animation:
  profileFloat
  4s ease-in-out infinite;
}

/* NAMA */
.profile-name{
  margin-top:18px;

  color:white;

  font-size:18px;

  font-weight:600;

  letter-spacing:.5px;

  text-shadow:
  0 0 12px rgba(
  255,255,255,.18
  );
}

/* DESKRIPSI */
.profile-desc{
  margin-top:2px;

  text-align:center;

  color:
  rgba(255,255,255,.65);

  font-size:13px;

  line-height:1.7;

  max-width:230px;
}

/* muncul halus */
@keyframes profileShow{

  from{
    opacity:0;

    transform:
    translate(-50%,-50%)
    translateY(40px);
  }

  to{
    opacity:1;

    transform:
    translate(-50%,-50%);
  }
}

/* ngambang pelan */
@keyframes profileFloat{

  0%,100%{
    transform:
    translateY(0);
  }

  50%{
    transform:
    translateY(-8px);
  }
}

/* tombol */
.play-btn{
  position:absolute;
  left:50%;
  bottom:220px;

  transform:translateX(-50%);

  width:170px;
  height:48px;

  border:none;
  border-radius:20px;

  background:
  rgba(255,255,255,.08);

  color:white;

  font-size:15px;
  font-weight:600;

  backdrop-filter:blur(10px);

  border:
  1px solid rgba(
  255,255,255,.12
  );

  box-shadow:
  0 0 20px rgba(
  130,90,255,.18
  );

  cursor:pointer;

  z-index:50;

  transition:.25s;
}

.play-btn:active{
  transform:
  translateX(-50%)
  scale(.95);
}

/* loading */
.loading-wrap{
  position:absolute;

  left:50%;
  bottom:40px;

  transform:translateX(-50%);

  width:180px;
  height:5px;

  border-radius:999px;

  overflow:hidden;

  background:
  rgba(255,255,255,.08);

  opacity:0;

  transition:.3s;

  z-index:60;
}

.loading-bar{
  width:0%;

  height:100%;

  border-radius:999px;

  background:
  linear-gradient(
    90deg,
    #9f63ff,
    #ff77c8,
    #6ab7ff
  );

  box-shadow:
  0 0 15px rgba(
  170,120,255,.6
  );
}

/* flash putih */
.flash-screen{
  position:fixed;
  inset:0;

  background:white;

  opacity:0;
  pointer-events:none;

  z-index:999;

  transition:.6s;
}

/* video */
.video-player{
  position:fixed;

  top:50%;
  left:50%;

  transform:
  translate(-50%,-50%);

  width:88vw;
  max-width:360px;

  max-height:70vh;

  border-radius:26px;

  background:#000;

  object-fit:contain;

  opacity:0;
  visibility:hidden;

  z-index:99999;

  transition:
  opacity .8s ease;
}

.back-btn{
  position:absolute;
  left:50%;
  bottom:155px;

  transform:
  translateX(-50%);

  width:170px;
  height:48px;

  border:none;
  border-radius:20px;

  background:
  rgba(255,255,255,.06);

  color:white;

  font-size:15px;
  font-weight:600;

  border:
  1px solid rgba(
  255,255,255,.10
  );

  backdrop-filter:
  blur(10px);

  cursor:pointer;

  z-index:50;
}
</style>
</head>

<body>
  
<div class="battle-bg"></div>
<div class="intro-card"></div>
<div class="profile-box">

  <img
  src="av.jpg"
  class="profile-img"
  alt="profile">

  <h1 class="profile-name">
    Seonghyeon 
  </h1>

  <p class="profile-desc">
    Thanks For Much!
  </p>

</div>

<button class="play-btn" id="playBtn">
  ▶ Play Video
</button>

<div class="loading-wrap" id="loadingWrap">
  <div class="loading-bar" id="loadingBar"></div>
</div>

<div class="flash-screen" id="flashScreen"></div>

<video
id="mainVideo"
class="video-player"
playsinline
preload="auto"
controls>

  <source
  src="vd.mp4"
  type="video/mp4">

</video>

<button
class="back-btn"
id="backBtn"
style="display:none;">

↩ Kembali

</button>

<script>
const playBtn =
document.getElementById(
"playBtn"
);

const backBtn =
document.getElementById(
"backBtn"
);

const loadingWrap =
document.getElementById(
"loadingWrap"
);

const loadingBar =
document.getElementById(
"loadingBar"
);

const flashScreen =
document.getElementById(
"flashScreen"
);

const video =
document.getElementById(
"mainVideo"
);

const card =
document.querySelector(
".intro-card"
);

const profile =
document.querySelector(
".profile-box"
);

const bg =
document.querySelector(
".battle-bg"
);

let hasWatched =
false;

/* PLAY VIDEO */
function startVideo(){

  playBtn.disabled =
  true;

  loadingBar.style.width =
  "0%";

  loadingWrap.style.display =
  "block";

  loadingWrap.style.opacity =
  "1";

  let progress = 0;

  const loading =
  setInterval(()=>{

    progress += 8;

    loadingBar.style.width =
    progress + "%";

    if(progress >= 100){

      clearInterval(
      loading
      );

      flashScreen.style.opacity =
      "1";

      card.style.display =
      "none";

      profile.style.display =
      "none";

      playBtn.style.display =
      "none";

      backBtn.style.display =
      "none";

      loadingWrap.style.display =
      "none";

      bg.style.display =
      "none";

      document.body.style.background =
      "#000";

      setTimeout(()=>{

        flashScreen.style.opacity =
        "0";

        video.style.visibility =
        "visible";

        video.style.opacity =
        "1";

        video.currentTime =
        0;

        video.play();

      },700);

    }

  },15);

}

playBtn.addEventListener(
"click",
startVideo
);

/* VIDEO SELESAI */
/* kalau video berhenti manual */
video.addEventListener(
"pause",
()=>{

  if(
    video.currentTime >=
    video.duration - 0.3
  ){

    card.style.display =
    "block";

    profile.style.display =
    "flex";

    playBtn.style.display =
    "block";

    backBtn.style.display =
    "block";

    playBtn.innerHTML =
    "▶ Play Again";

    playBtn.disabled =
    false;

    bg.style.display =
    "block";

    document.body.style.background =
    "#08040f";

    video.style.opacity =
    "0";

    video.style.visibility =
    "hidden";
  }

});

/* TOMBOL KEMBALI */
backBtn.addEventListener(
"click",
()=>{

  /* reset video */
  video.pause();

  video.currentTime =
  0;

window.location.href =
"../../../index.html";
  
});
</script>
</body>
</html>
